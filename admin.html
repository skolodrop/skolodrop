<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СКУЛДРОП // ADMIN v6</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020204;--s1:#07070d;--s2:#0a0a14;--card:#0d0d18;
  --border:#161625;--border2:#1e1e32;
  --green:#00ff88;--red:#ff2244;--orange:#ff6b00;--yellow:#ffd700;--cyan:#00e5ff;--purple:#a855f7;
  --text:#b0b8d0;--text2:#484e66;
  --mono:'Share Tech Mono',monospace;--hud:'Orbitron',sans-serif;
}
body{font-family:var(--mono);background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,34,68,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,34,68,.012) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg)}
.login-box{width:100%;max-width:380px;padding:32px 24px;background:var(--card);border:1px solid var(--border2);border-radius:12px;text-align:center}
.login-logo{font-family:var(--hud);font-size:20px;font-weight:900;color:var(--red);letter-spacing:4px;text-shadow:0 0 20px rgba(255,34,68,.5);margin-bottom:6px}
.login-sub{font-size:10px;color:var(--text2);letter-spacing:2px;margin-bottom:28px}
#admin-screen{display:none;position:relative;z-index:1;padding:20px;max-width:960px;margin:0 auto}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(2,2,4,.96);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);margin:-20px -20px 20px}
.admin-logo{font-family:var(--hud);font-size:14px;font-weight:900;color:var(--red);letter-spacing:3px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-val{font-family:var(--hud);font-size:22px;font-weight:700;margin-bottom:4px}
.stat-lbl{font-size:10px;color:var(--text2);letter-spacing:.5px}
.s-g{color:var(--green)}.s-r{color:var(--red)}.s-y{color:var(--yellow)}.s-c{color:var(--cyan)}.s-o{color:var(--orange)}.s-p{color:var(--purple)}
.tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--mono);border:1px solid var(--border2);color:var(--text2);background:var(--card);transition:all .2s;white-space:nowrap}
.tab.on{border-color:var(--red);color:var(--red);background:rgba(255,34,68,.08)}
.sec-title{font-family:var(--hud);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text);margin-bottom:12px}
.row-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.row-body{flex:1;min-width:0}
.row-title{font-size:13px;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-meta{font-size:10px;color:var(--text2)}
.row-actions{display:flex;gap:6px;flex-shrink:0}
.wd-card{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.2);border-radius:7px;padding:12px;margin-bottom:8px}
.rep-card{background:rgba(255,34,68,.05);border:1px solid rgba(255,34,68,.2);border-radius:7px;padding:12px;margin-bottom:8px}
.school-card{background:var(--card);border:1px solid var(--border2);border-radius:7px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.school-ico{width:36px;height:36px;border-radius:6px;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.user-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:14px;color:#000;font-weight:700;flex-shrink:0}
.user-info{flex:1}
.user-nick{font-size:13px;color:var(--text);margin-bottom:2px}
.user-meta{font-size:10px;color:var(--text2)}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px}
.dot-online{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot-offline{background:var(--text2)}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px}
.b-open{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2)}
.b-taken{background:rgba(255,107,0,.08);color:var(--orange);border:1px solid rgba(255,107,0,.2)}
.b-done{background:rgba(80,88,112,.1);color:var(--text2);border:1px solid var(--border)}
.post-card{background:var(--card);border:1px solid var(--border2);border-radius:7px;padding:12px;margin-bottom:8px}
.post-content{font-size:12px;color:var(--text);margin-bottom:8px;line-height:1.6}
.post-media{max-width:100%;max-height:150px;border-radius:5px;margin-bottom:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 14px;border-radius:5px;border:none;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:700;transition:all .2s;gap:5px}
.btn-r{background:rgba(255,34,68,.12);color:var(--red);border:1px solid rgba(255,34,68,.25)}
.btn-r:hover{background:rgba(255,34,68,.22)}
.btn-g{background:var(--green);color:#000}
.btn-g:hover{box-shadow:0 0 14px rgba(0,255,136,.4)}
.btn-o{background:transparent;color:var(--text);border:1px solid var(--border2)}
.btn-o:hover{border-color:var(--green);color:var(--green)}
.inp{width:100%;background:var(--s1);border:1px solid var(--border2);border-radius:5px;padding:10px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--red)}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--text2);margin-bottom:5px;letter-spacing:.8px}
.empty{text-align:center;padding:30px;color:var(--text2);font-size:12px}
.loader{text-align:center;padding:24px;color:var(--text2)}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--card);border:1px solid var(--border2);padding:8px 16px;border-radius:6px;font-size:11px;opacity:0;transition:all .25s;z-index:999;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.gap{height:10px}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚡ ADMIN</div>
    <div class="login-sub">// СКУЛДРОП v6 ПАНЕЛЬ</div>
    <div class="field"><label>СЕКРЕТНЫЙ ПАРОЛЬ</label>
      <input class="inp" type="password" id="login-pass" placeholder="введи пароль" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-r" style="width:100%;padding:11px" onclick="doLogin()">ВОЙТИ →</button>
  </div>
</div>

<div id="admin-screen">
  <div class="admin-header">
    <div class="admin-logo">⚡ SKOLODROP ADMIN v6</div>
    <button class="btn btn-o" onclick="doLogout()">выйти</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card" onclick="switchTab('orders')"><div class="stat-val s-g" id="st-orders">–</div><div class="stat-lbl">ЗАКАЗОВ</div></div>
    <div class="stat-card" onclick="switchTab('orders')"><div class="stat-val s-c" id="st-open">–</div><div class="stat-lbl">ОТКРЫТЫХ</div></div>
    <div class="stat-card" onclick="switchTab('orders')"><div class="stat-val s-o" id="st-taken">–</div><div class="stat-lbl">В РАБОТЕ</div></div>
    <div class="stat-card" onclick="switchTab('orders')"><div class="stat-val s-g" id="st-done">–</div><div class="stat-lbl">ВЫПОЛНЕНО</div></div>
    <div class="stat-card" onclick="switchTab('posts')"><div class="stat-val s-p" id="st-posts">–</div><div class="stat-lbl">ПОСТОВ</div></div>
    <div class="stat-card" onclick="switchTab('reports')"><div class="stat-val s-r" id="st-reports">–</div><div class="stat-lbl">ЖАЛОБ</div></div>
    <div class="stat-card" onclick="switchTab('schools')"><div class="stat-val s-p" id="st-schools">–</div><div class="stat-lbl">ШКОЛ</div></div>
    <div class="stat-card" onclick="switchTab('schools')"><div class="stat-val s-g" id="st-users">–</div><div class="stat-lbl">ПОЛЬЗОВАТЕЛЕЙ</div></div>
    <div class="stat-card" onclick="loadOnlineCount()"><div class="stat-val s-g" id="online-count">–</div><div class="stat-lbl">ОНЛАЙН</div></div>
  </div>

  <div class="tabs">
    <div class="tab" onclick="switchTab('schools')">🏫 Школы</div>
    <div class="tab" onclick="switchTab('posts')">📱 Посты</div>
    <div class="tab" onclick="switchTab('orders')">📋 Заказы</div>
    <div class="tab" onclick="switchTab('reports')">🚩 Жалобы</div>
    <div class="tab" onclick="switchTab('ban')">⛔ Бан</div>
  </div>

  <div id="admin-content"></div>
</div>

<div id="toast"></div>

<script>
const WORKER_URL = 'https://cast-practitioners-communicate-garlic.trycloudflare.com';
 
let adminToken = sessionStorage.getItem('admin_token')||'';
let currentTab = 'schools';

if(adminToken) showAdmin();

async function doLogin(){
  const pass=document.getElementById('login-pass').value.trim();
  if(!pass) return;
  try{
    const res=await fetch(WORKER_URL+'/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({secret:pass})});
    const d=await res.json();
    if(!res.ok){toast('❌ '+d.error);return;}
    adminToken=d.token;
    sessionStorage.setItem('admin_token',adminToken);
    showAdmin();
  }catch(e){toast('❌ '+e.message);}
}
function doLogout(){
  sessionStorage.removeItem('admin_token');adminToken='';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('admin-screen').style.display='none';
}
function showAdmin(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-screen').style.display='block';
  loadStats();loadTab('schools');
  loadOnlineCount();
  setInterval(loadOnlineCount, 30000);
}
async function adminApi(method,path,body){
  const res=await fetch(WORKER_URL+path,{method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken},body:body?JSON.stringify(body):undefined});
  const d=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(d.error||'Ошибка');
  return d;
}
async function loadStats(){
  try{
    const s=await adminApi('GET','/api/admin/stats');
    document.getElementById('st-orders').textContent=s.orders.total;
    document.getElementById('st-open').textContent=s.orders.open;
    document.getElementById('st-taken').textContent=s.orders.taken;
    document.getElementById('st-done').textContent=s.orders.done;
    document.getElementById('st-posts').textContent=s.posts;
    document.getElementById('st-reports').textContent=s.reports.unresolved+' новых';
    document.getElementById('st-schools').textContent=s.schools.length;
    document.getElementById('st-users').textContent=s.total_users;
  }catch(e){toast('❌ '+e.message);}
}
async function loadOnlineCount(){
  try{
    const res = await fetch(WORKER_URL+'/api/online');
    const data = await res.json();
    document.getElementById('online-count').textContent = data.count;
  }catch(e){}
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const tabs=['schools','posts','orders','reports','ban'];
    t.classList.toggle('on',tabs[i]===tab);
  });
  loadTab(tab);
}
async function loadTab(tab){
  const c=document.getElementById('admin-content');
  c.innerHTML=`<div class="loader"><span class="spin">⟳</span> загрузка...</div>`;
  if(tab==='schools') await renderSchools(c);
  if(tab==='posts') await renderPosts(c);
  if(tab==='orders') await renderOrders(c);
  if(tab==='reports') await renderReports(c);
  if(tab==='ban') renderBan(c);
}

// Школы
async function renderSchools(c){
  try{
    const s=await adminApi('GET','/api/admin/stats');
    const schools=s.schools||[];
    if(!schools.length){c.innerHTML='<div class="empty">Школ пока нет</div>';return;}
    c.innerHTML=`<div class="sec-title">// ШКОЛЫ (${schools.length})</div>`+
      schools.map(school=>`
        <div class="school-card">
          <div class="school-ico">🏫</div>
          <div style="flex:1">
            <div style="font-size:13px;color:var(--text);margin-bottom:3px">${esc(school.name)}</div>
            <div style="font-size:10px;color:var(--text2)">👥 ${school.members} участников · 🟢 ${school.online || 0} онлайн</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-o btn-sm" onclick="viewSchoolChat(${school.id},'${esc(school.name)}')">💬 Чат</button>
            <button class="btn btn-o btn-sm" onclick="viewSchoolUsers(${school.id},'${esc(school.name)}')">👤 Участники</button>
            <button class="btn btn-r btn-sm" onclick="deleteSchool(${school.id},'${esc(school.name)}')">🗑</button>
          </div>
        </div>`).join('');
  }catch(e){c.innerHTML=`<div class="empty">❌ ${esc(e.message)}</div>`;}
}

// ПОСТЫ (новый раздел)
async function renderPosts(c){
  try{
    const posts=await adminApi('GET','/api/admin/posts');
    if(!posts.length){c.innerHTML='<div class="empty">Постов нет</div>';return;}
    c.innerHTML=`<div class="sec-title">// ВСЕ ПОСТЫ (${posts.length})</div>`+
      posts.map(p=>`
        <div class="post-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:12px;color:var(--cyan);font-weight:700">${esc(p.author_nick)}</span>
            <span style="font-size:10px;color:var(--text2)">${timeAgo(p.created_at)}</span>
          </div>
          <div class="post-content">${esc(p.content)}</div>
          ${p.media_url ? `<img class="post-media" src="${esc(p.media_url)}" onerror="this.style.display='none'">` : ''}
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
            <span style="font-size:11px;color:var(--yellow)">❤️ ${p.likes_count || 0}</span>
            <span style="font-size:11px;color:var(--cyan)">💬 ${p.comments_count || 0}</span>
            <button class="btn btn-r btn-sm" onclick="deletePost('${p.id}')">🗑 Удалить</button>
          </div>
        </div>`).join('');
  }catch(e){c.innerHTML=`<div class="empty">❌ ${esc(e.message)}</div>`;}
}

async function deletePost(id){
  if(!confirm('Удалить пост?')) return;
  try{
    await adminApi('DELETE','/api/admin/posts',{id});
    toast('✅ Пост удален');
    loadStats();
    renderPosts(document.getElementById('admin-content'));
  }catch(e){toast('❌ '+e.message);}
}

async function viewSchoolUsers(schoolId,schoolName){
  const c=document.getElementById('admin-content');
  c.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <button class="btn btn-o btn-sm" onclick="loadTab('schools')">← Назад</button>
    <span style="font-family:var(--hud);font-size:12px;color:var(--cyan)">🏫 ${esc(schoolName)}</span>
  </div>
  <div class="loader"><span class="spin">⟳</span> загрузка...</div>`;

  try{
    const users = await adminApi('GET', `/api/admin/school-users?school_id=${schoolId}`);
    
    if(!users || !users.length){
      c.querySelector('.loader').outerHTML='<div class="empty">👥 В этой школе пока нет учеников</div>';
      return;
    }

    const now = Date.now();
    const list = users.map(u=>{
      const isOnline = u.last_seen && (now - new Date(u.last_seen).getTime() < 5*60*1000);
      return `
        <div class="user-card">
          <div class="user-avatar">${esc(u.nick[0].toUpperCase())}</div>
          <div class="user-info">
            <div class="user-nick">${esc(u.nick)}</div>
            <div class="user-meta">с нами с ${new Date(u.created_at).toLocaleDateString('ru')}</div>
          </div>
          <div><span class="status-dot ${isOnline ? 'dot-online' : 'dot-offline'}"></span>${isOnline ? 'онлайн' : 'офлайн'}</div>
        </div>
      `;
    }).join('');

    c.querySelector('.loader').outerHTML = list;
  }catch(e){
    c.querySelector('.loader').outerHTML = `<div class="empty">❌ ${esc(e.message)}</div>`;
  }
}
async function deleteSchool(id,name){
  if(!confirm(`Удалить школу "${name}" и всех её учеников? Это действие необратимо.`)) return;
  try{
    await adminApi('DELETE',`/api/admin/school?id=${id}`);
    toast('✅ Школа удалена');
    loadStats();loadTab('schools');
  }catch(e){toast('❌ '+e.message);}
}

async function viewSchoolChat(schoolId,schoolName){
  const c=document.getElementById('admin-content');
  c.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <button class="btn btn-o btn-sm" onclick="loadTab('schools')">← Назад</button>
    <span style="font-family:var(--hud);font-size:12px;color:var(--cyan)">🏫 ${esc(schoolName)}</span>
  </div>
  <div class="loader"><span class="spin">⟳</span></div>`;
  try{
    const data=await adminApi('GET',`/api/admin/school-chat?school_id=${schoolId}`);
    const msgs=Array.isArray(data)?data:[];
    if(!msgs.length){c.querySelector('.loader').innerHTML='<div class="empty">Сообщений нет</div>';return;}
    const list=msgs.map(m=>`
      <div class="row-card">
        <div class="row-body">
          <div style="font-size:11px;font-weight:700;color:var(--cyan);margin-bottom:3px">${esc(m.nick)}</div>
          <div style="font-size:12px;color:var(--text)">${esc(m.message)}</div>
          <div style="font-size:10px;color:var(--text2);margin-top:3px">${timeAgo(m.created_at)}</div>
        </div>
        <button class="btn btn-r btn-sm" onclick="deleteSchoolMsg('${m.id}',${schoolId},'${esc(schoolName)}')">🗑</button>
      </div>`).join('');
    c.querySelector('.loader').outerHTML=list;
  }catch(e){c.innerHTML+=`<div class="empty">❌ ${esc(e.message)}</div>`;}
}
async function deleteSchoolMsg(id,schoolId,schoolName){
  if(!confirm('Удалить сообщение?')) return;
  try{
    await adminApi('DELETE',`/api/admin/school-msg/${id}`);
    toast('🗑 Удалено');viewSchoolChat(schoolId,schoolName);
  }catch(e){toast('❌ '+e.message);}
}

async function renderOrders(c){
  try{
    const orders=await adminApi('GET','/api/admin/orders');
    if(!orders.length){c.innerHTML='<div class="empty">Заказов нет</div>';return;}
    c.innerHTML=`<div class="sec-title">// ВСЕ ЗАКАЗЫ (${orders.length})</div>`+
      orders.map(o=>`
        <div class="row-card">
          <div class="row-body">
            <div class="row-title">${esc(o.title)}</div>
            <div class="row-meta">
              <span class="badge ${o.status==='open'?'b-open':o.status==='taken'?'b-taken':'b-done'}">${o.status}</span>
              &nbsp;${esc(o.author_nick)} · ${esc(o.amount)} ₽ · ${o.school_name?'🏫 '+esc(o.school_name)+' · ':''} ${timeAgo(o.created_at)}
            </div>
          </div>
          <div class="row-actions">
            <button class="btn btn-r" onclick="delOrder('${o.id}')">🗑</button>
            <button class="btn" style="background:rgba(255,107,0,.1);color:var(--orange);border:1px solid rgba(255,107,0,.25)" onclick="banUser('${esc(o.author_nick)}')">⛔</button>
          </div>
        </div>`).join('');
  }catch(e){c.innerHTML=`<div class="empty">❌ ${esc(e.message)}</div>`;}
}
async function delOrder(id){
  if(!confirm('Удалить?')) return;
  try{await adminApi('DELETE',`/api/admin/orders/${id}`);toast('🗑 Удалено');loadStats();loadTab('orders');}
  catch(e){toast('❌ '+e.message);}
}

async function renderReports(c){
  try{
    const reports=await adminApi('GET','/api/admin/reports');
    if(!reports.length){c.innerHTML='<div class="empty">✅ Жалоб нет</div>';return;}
    c.innerHTML=`<div class="sec-title">// ЖАЛОБЫ (${reports.length})</div>`+
      reports.map(r=>`
        <div class="rep-card">
          <div style="font-size:12px;color:var(--text);margin-bottom:6px">${esc(r.reason)}</div>
          <div style="font-size:10px;color:var(--text2);margin-bottom:10px">от ${esc(r.reporter_nick)} · ${timeAgo(r.created_at)}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-r" onclick="delOrder('${r.order_id}')">🗑 Удалить заказ</button>
            <button class="btn" style="background:rgba(255,107,0,.1);color:var(--orange);border:1px solid rgba(255,107,0,.25)" onclick="banUser('${esc(r.reporter_nick)}')">⛔ Бан</button>
            <button class="btn btn-g" onclick="resolveReport('${r.id}')">✅ Закрыть</button>
          </div>
        </div>`).join('');
  }catch(e){c.innerHTML=`<div class="empty">❌ ${esc(e.message)}</div>`;}
}
async function resolveReport(id){
  try{await adminApi('PUT',`/api/admin/reports/${id}/resolve`);toast('✅ Закрыто');loadStats();loadTab('reports');}
  catch(e){toast('❌ '+e.message);}
}

function renderBan(c){
  c.innerHTML=`
    <div class="sec-title">// ЗАБАНИТЬ ПОЛЬЗОВАТЕЛЯ</div>
    <div style="background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:16px;margin-bottom:20px">
      <div class="field"><label>НИК</label><input class="inp" id="ban-inp" placeholder="ghost_x"></div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.7">⚠️ Бан удалит все заказы пользователя и заблокирует аккаунт.</div>
      <button class="btn btn-r" onclick="submitBan()" style="width:100%;padding:11px">⛔ ЗАБАНИТЬ</button>
    </div>

    <div class="sec-title">// УДАЛИТЬ АККАУНТ</div>
    <div style="background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:16px">
      <div class="field"><label>НИК</label><input class="inp" id="delete-user-inp" placeholder="ghost_x"></div>
      <div style="font-size:11px;color:var(--red);margin-bottom:12px;line-height:1.7">⚠️ Аккаунт удалится навсегда вместе со всеми заказами, сообщениями, оценками.</div>
      <button class="btn btn-r" onclick="deleteUser()" style="width:100%;padding:11px">🗑 УДАЛИТЬ АККАУНТ</button>
    </div>
  `;
}
async function banUser(nick){
  if(!confirm(`Забанить ${nick}?`)) return;
  try{await adminApi('POST','/api/admin/ban',{nick});toast('⛔ Забанен');loadStats();}
  catch(e){toast('❌ '+e.message);}
}
async function submitBan(){
  const nick=document.getElementById('ban-inp').value.trim();
  if(!nick){toast('⚠️ Введи ник');return;}
  await banUser(nick);
}
async function deleteUser(){
  const nick=document.getElementById('delete-user-inp').value.trim();
  if(!nick){toast('⚠️ Введи ник');return;}
  if(!confirm(`Удалить аккаунт ${nick} и все его данные? Это действие необратимо.`)) return;
  try{
    await adminApi('DELETE',`/api/admin/user?nick=${encodeURIComponent(nick)}`);
    document.getElementById('delete-user-inp').value='';
    toast('✅ Аккаунт удалён');
    loadStats();
  }catch(e){toast('❌ '+e.message);}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function timeAgo(ts){const d=Date.now()-new Date(ts).getTime();if(d<60000)return 'только что';if(d<3600000)return Math.floor(d/60000)+'м назад';if(d<86400000)return Math.floor(d/3600000)+'ч назад';return Math.floor(d/86400000)+'д назад';}
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2800);}
</script>
</body>
</html>
